version: 2
updates:
  # GitHub Actions — patch/minor only
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
      - 'github-actions'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # Yarn workspace root
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
    groups:
      dev-dependencies:
        patterns:
          - '@biomejs/*'
          - 'turbo'
    ignore:
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  # Packages — ui only (utils, create-bomb-boilerplate removed)
  - package-ecosystem: 'npm'
    directory: '/packages/ui'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'
      - 'packages'
    ignore:
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
